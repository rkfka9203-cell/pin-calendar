<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1565C0">
<title>мҷёмЈј н•Җ мғқмӮ°кҙҖлҰ¬</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','л§‘мқҖ кі л”•',sans-serif;background:#f5f5f5;-webkit-tap-highlight-color:transparent}
.header{background:#1565C0;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:15px;font-weight:700}
.sync-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer}
.status-bar{padding:4px 12px;background:#E3F2FD;font-size:11px;color:#1565C0;text-align:center}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid #e0e0e0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-bar .tab{flex:1;text-align:center;padding:8px 0 6px;font-size:11px;color:#999;cursor:pointer;transition:color .2s}
.tab-bar .tab.active{color:#1565C0;font-weight:700}
.tab-bar .tab .icon{font-size:20px;display:block}
.content{padding-bottom:64px}
.view{display:none}.view.active{display:block}
.cal-nav{display:flex;align-items:center;justify-content:center;padding:10px;background:#fff;gap:4px}
.cal-nav button{background:none;border:none;font-size:18px;padding:6px 14px;cursor:pointer;border-radius:8px}
.cal-nav button:active{background:#e0e0e0}
.cal-nav .month-label{font-size:15px;font-weight:700;min-width:110px;text-align:center}
.cal-nav .today-btn{font-size:12px;padding:5px 10px;background:#e0e0e0;border-radius:14px;border:none;cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#ddd;margin:0 4px}
.cal-hdr{background:#E8EAF6;text-align:center;padding:5px 0;font-size:11px;font-weight:700;color:#333}
.cal-hdr.we{background:#FFEBEE;color:#B71C1C}
.cal-c{background:#fff;min-height:72px;padding:3px;font-size:10px;overflow:hidden;cursor:pointer}
.cal-c:active{background:#f0f0f0}
.cal-c .dn{font-weight:700;font-size:12px;margin-bottom:1px}
.cal-c.today .dn{color:#1565C0}
.cal-c.empty{background:#f5f5f5;cursor:default}
.capa-b{height:5px;background:#E0E0E0;border-radius:3px;margin:1px 0;overflow:hidden}
.capa-b .fill{height:100%;border-radius:3px}
.cal-it{font-size:9px;padding:1px 3px;margin:1px 0;border-radius:2px;border-left:2px solid;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-it.f1{border-left-color:#1565C0;background:#E3F2FD}
.cal-it.f2{border-left-color:#2E7D32;background:#E8F5E9}
.cal-it.urg{background:#FFEBEE!important}
.cal-it.done{opacity:.4;text-decoration:line-through}
.sf{padding:8px 10px;background:#fff;display:flex;gap:6px;flex-wrap:wrap;align-items:center;position:sticky;top:48px;z-index:50;border-bottom:1px solid #e0e0e0}
.sf input,.sf select{padding:7px 8px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.sf input{flex:1;min-width:80px}.sf select{min-width:75px}
.sf .chk{font-size:12px;white-space:nowrap;display:flex;align-items:center;gap:3px}
.si{padding:5px 10px;background:#f5f5f5;font-size:11px;color:#666}
.sl{padding:0 6px}
.si-card{background:#fff;border-radius:10px;margin:6px 0;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.si-card.urg{border-left:4px solid #F44336}
.si-card.comp{opacity:.45}
.si-card .top{display:flex;justify-content:space-between;align-items:center}
.si-card .pn{font-weight:700;font-size:14px}
.si-card .li{color:#888;font-size:12px;margin-left:4px}
.si-card .qt{color:#1565C0;font-weight:700;font-size:13px}
.sr{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.sc{padding:4px 10px;border-radius:16px;font-size:11px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;user-select:none;transition:all .15s}
.sc:active{transform:scale(.95)}
.sc.on{background:#1565C0;color:#fff;border-color:#1565C0}
.sc.on.spc{background:#FF9800;border-color:#FF9800}
.sc.on.oqc{background:#F44336;border-color:#F44336}
.sc.on.etc{background:#9E9E9E;border-color:#9E9E9E}
.sc.on.dn{background:#4CAF50;border-color:#4CAF50}
.dr{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.df{padding:4px 8px;background:#f5f5f5;border-radius:6px;font-size:11px;color:#333;cursor:pointer}
.df.empty{color:#bbb}
.df:active{background:#e0e0e0}
.mp{font-size:11px;color:#888;margin-top:4px;cursor:pointer}
.mp:active{color:#555}
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200}
.mo.on{display:flex;align-items:flex-end;justify-content:center}
.md{background:#fff;width:100%;max-width:500px;border-radius:16px 16px 0 0;padding:20px 16px 24px;max-height:80vh;overflow-y:auto}
.md h3{margin-bottom:10px;font-size:16px}
.md .sub{color:#666;font-size:13px;margin-bottom:12px}
.btn{padding:10px 18px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.btn:active{opacity:.8}
.bp{background:#1565C0;color:#fff}
.bd{background:#F44336;color:#fff}
.bc{background:#e0e0e0;color:#333}
.md textarea{width:100%;min-height:100px;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px;resize:vertical;font-family:inherit}
.md input[type=date],.md input[type=number]{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px}
.brow{display:flex;gap:8px;margin-top:16px;justify-content:center}
.loading{text-align:center;padding:40px;color:#999}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#1565C0;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
<h1>рҹҸӯ мҷёмЈј н•Җ мғқмӮ°кҙҖлҰ¬</h1>
<button class="sync-btn" onclick="loadAll()">рҹ”„ лҸҷкё°нҷ”</button>
</div>
<div class="status-bar" id="sbar">лҚ°мқҙн„° лЎңл“ң мӨ‘...</div>
<div class="content">
<div class="view active" id="vCal">
<div class="cal-nav">
<button onclick="calP()">в—Җ</button>
<span class="month-label" id="calLbl"></span>
<button onclick="calN()">в–¶</button>
<button class="today-btn" onclick="calT()">мҳӨлҠҳ</button>
</div>
<div id="calG"></div>
</div>
<div class="view" id="vSort">
<div class="sf">
<input type="text" id="fProd" placeholder="м ңн’ҲлӘ…" oninput="rSort()">
<input type="text" id="fLot" placeholder="лЎңнҠё" oninput="rSort()" style="max-width:80px">
<select id="fFac" onchange="rSort()">
<option value="">м „мІҙ</option>
<option value="1кіөмһҘ">1кіөмһҘ</option>
<option value="2кіөмһҘ">2кіөмһҘ</option>
<option value="none">лҜём„Өм •</option>
</select>
<label class="chk"><input type="checkbox" id="fDone" onchange="rSort()"> мҷ„лЈҢнҸ¬н•Ё</label>
</div>
<div class="si" id="sInfo"></div>
<div class="sl" id="sList"></div>
</div>
</div>
<div class="tab-bar">
<div class="tab active" onclick="swTab('cal')"><span class="icon">рҹ“Ҷ</span>мәҳлҰ°лҚ”</div>
<div class="tab" onclick="swTab('sort')"><span class="icon">вӯҗ</span>мҶҢнҢ…</div>
</div>
<div class="mo" id="mOverlay" onclick="clM(event)">
<div class="md" id="mContent"></div>
</div>
<script>
// ===== м„Өм • (л°ҳл“ңмӢң ліёмқё к°’мңјлЎң ліҖкІҪ!) =====
const GS_URL='https://script.google.com/macros/s/AKfycbwpPGa5pvOouObcHWqwJbTQgxVQYR8qdQSWhJI38V5rBFRIdWuUZVgjQzkZ-P5bDBT1/exec';
const WO_ID='1_3PakMet-BwSVLAgnqHN5CS336hrs-L266Rc_aIFFZI';
// ============================================
const CAPA={'1кіөмһҘ':20000,'2кіөмһҘ':80000};
let raw=[],sorted=[],stData={},cY=new Date().getFullYear(),cM=new Date().getMonth();

async function loadAll(){
  setSt('вҳҒпёҸ лҚ°мқҙн„° лЎңл“ң мӨ‘...');
  try{await Promise.all([loadWO(),loadSt()]);
  proc();render();
  setSt('вң… лЎңл“ң мҷ„лЈҢ | '+sorted.length+'кұҙ | '+new Date().toLocaleTimeString());
  }catch(e){setSt('вқҢ мӢӨнҢЁ: '+e.message);}
}
async function loadWO(){
  const r=await fetch(GS_URL+'?action=getWO&sheetId='+WO_ID);
  const b=await r.json();
  if(b.status!=='ok')throw new Error(b.message||'WO fail');
  const rows=b.data;if(rows.length<2)throw new Error('No data');
  const hd=rows[1].map(h=>String(h).trim());
  raw=rows.slice(2).map(row=>{const o={};hd.forEach((h,i)=>o[h]=row[i]!==undefined?row[i]:'');return o;});
}
async function loadSt(){
  const r=await fetch(GS_URL+'?action=getAll');
  const b=await r.json();
  if(b.status==='ok'&&b.data){
    const v=b.data['__outsource_status__'];
    if(v)stData=typeof v==='string'?JSON.parse(v):v;
  }
}
async function saveSt(){
  try{await fetch(GS_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'set',key:'__outsource_status__',value:JSON.stringify(stData)})});
  }catch(e){console.error(e);}
}
function proc(){
  const f=raw.filter(r=>{const l=String(r['кё°мҙҲлЎңнҠё']||'');const m=String(r['нҲ¬мһ…мһҗмһ¬']||'');return!l.startsWith('J')&&/^[AS]/.test(m);});
  const g={};
  f.forEach(r=>{const k=r['м ңн’ҲлӘ…']+'||'+r['кё°мҙҲлЎңнҠё'];
    if(!g[k])g[k]={'м ңн’ҲлӘ…':String(r['м ңн’ҲлӘ…']),'кё°мҙҲлЎңнҠё':String(r['кё°мҙҲлЎңнҠё']),'мҳӨлҚ”мҲҳлҹү':0,'WOмӢңк°„':r['WOмӢңк°„']};
    g[k]['мҳӨлҚ”мҲҳлҹү']+=parseInt(String(r['нҲ¬мһ…мҲҳлҹү']||'0').replace(/,/g,''))||0;
  });
  sorted=Object.values(g).sort((a,b)=>{const c=a['м ңн’ҲлӘ…'].localeCompare(b['м ңн’ҲлӘ…']);return c!==0?c:a['кё°мҙҲлЎңнҠё'].localeCompare(b['кё°мҙҲлЎңнҠё']);});
}
function gSt(p,l){const k=p+'||'+l;return stData[k]||{'нҳ„нҷ©':'','мғқмӮ°мҷ„лЈҢ':false,'мғқмӮ°мқјмһҗ':'','лӮ©н’Ҳмҡ”мІӯмқјмһҗ':'','мһ…кі мҳҲм •мқј':'','кёҙкёү':false,'л©”лӘЁ':''};}
function sSt(p,l,f,v){const k=p+'||'+l;
  if(!stData[k])stData[k]={'нҳ„нҷ©':'','мғқмӮ°мҷ„лЈҢ':false,'мғқмӮ°мқјмһҗ':'','лӮ©н’Ҳмҡ”мІӯмқјмһҗ':'','мһ…кі мҳҲм •мқј':'','кёҙкёү':false,'л©”лӘЁ':''};
  stData[k][f]=v;saveSt();render();
}
function setSt(m){document.getElementById('sbar').textContent=m;}
function swTab(t){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-bar .tab').forEach(t=>t.classList.remove('active'));
  if(t==='cal'){document.getElementById('vCal').classList.add('active');document.querySelectorAll('.tab-bar .tab')[0].classList.add('active');}
  else{document.getElementById('vSort').classList.add('active');document.querySelectorAll('.tab-bar .tab')[1].classList.add('active');}
}
function render(){rCal();rSort();}
function calP(){cM--;if(cM<0){cM=11;cY--;}rCal();}
function calN(){cM++;if(cM>11){cM=0;cY++;}rCal();}
function calT(){const d=new Date();cY=d.getFullYear();cM=d.getMonth();rCal();}
function getSch(){
  const sc={};
  sorted.forEach(item=>{
    const st=gSt(item['м ңн’ҲлӘ…'],item['кё°мҙҲлЎңнҠё']);
    const fac=st['нҳ„нҷ©'],ds=st['мғқмӮ°мқјмһҗ'];
    if(!['1кіөмһҘ','2кіөмһҘ'].includes(fac)||!ds)return;
    const cap=CAPA[fac];let dates=[];
    if(ds.includes('~')){const[s,e]=ds.split('~').map(d=>new Date(d.trim()));if(isNaN(s)||isNaN(e))return;for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1))dates.push(new Date(d));}
    else{const d=new Date(ds);if(!isNaN(d))dates.push(d);}
    let rem=item['мҳӨлҚ”мҲҳлҹү'];
    dates.forEach(day=>{const dk=day.toISOString().split('T')[0];
      if(!sc[dk])sc[dk]={'1кіөмһҘ':0,'2кіөмһҘ':0,i1:[],i2:[]};
      const daily=Math.min(rem,cap);sc[dk][fac]+=daily;
      sc[dk][fac==='1кіөмһҘ'?'i1':'i2'].push({p:item['м ңн’ҲлӘ…'],b:item['кё°мҙҲлЎңнҠё'],q:daily,u:st['кёҙкёү'],e:st['мһ…кі мҳҲм •мқј'],d:st['мғқмӮ°мҷ„лЈҢ']});
      rem-=daily;
    });
  });
  return sc;
}
function rCal(){
  document.getElementById('calLbl').textContent=cY+'л…„ '+(cM+1)+'мӣ”';
  const sc=getSch(),td=new Date(),fd=new Date(cY,cM,1),sd=(fd.getDay()+6)%7,dim=new Date(cY,cM+1,0).getDate();
  const wd=['мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ ','мқј'];
  let h='<div class="cal-grid">';
  wd.forEach((w,i)=>h+='<div class="cal-hdr'+(i>=5?' we':'')+'">'+w+'</div>');
  let day=1;
  for(let row=0;row<6;row++){
    if(day>dim&&row>0)break;
    for(let col=0;col<7;col++){
      if((row===0&&col<sd)||day>dim){h+='<div class="cal-c empty"></div>';}
      else{
        const dt=new Date(cY,cM,day),dk=dt.toISOString().split('T')[0];
        const isT=dt.toDateString()===td.toDateString();
        const info=sc[dk];
        h+='<div class="cal-c'+(isT?' today':'')+'" onclick="showDay(\''+dk+'\')"><div class="dn">'+day+'</div>';
        if(info){
          ['1кіөмһҘ','2кіөмһҘ'].forEach(fc=>{const q=info[fc];if(!q)return;const cp=CAPA[fc],rt=q/cp*100,cl=rt>100?'#F44336':rt>=80?'#FF9800':'#4CAF50';
            h+='<div class="capa-b"><div class="fill" style="width:'+Math.min(rt,100)+'%;background:'+cl+'"></div></div>';});
          const items=[...info.i1.map(i=>({...i,f:'f1'})),...info.i2.map(i=>({...i,f:'f2'}))];
          items.slice(0,3).forEach(it=>{const nm=it.p.length>7?it.p.slice(0,7)+'вҖҰ':it.p;
            h+='<div class="cal-it '+it.f+(it.u?' urg':'')+(it.d?' done':'')+'">'+(it.u?'рҹҡЁ':'')+nm+' '+it.q.toLocaleString()+'</div>';});
          if(items.length>3)h+='<div style="font-size:8px;color:#999">+'+(items.length-3)+'</div>';
        }
        h+='</div>';day++;
      }
    }
  }
  h+='</div>';document.getElementById('calG').innerHTML=h;
}
function showDay(dk){
  const sc=getSch(),info=sc[dk];if(!info)return;
  const items=[...info.i1.map(i=>({...i,fc:'1кіөмһҘ'})),...info.i2.map(i=>({...i,fc:'2кіөмһҘ'}))];
  if(!items.length)return;
  let h='<h3>рҹ“Ҷ '+dk+'</h3>';
  ['1кіөмһҘ','2кіөмһҘ'].forEach(fc=>{const q=info[fc];if(!q)return;const cp=CAPA[fc],rt=(q/cp*100).toFixed(1),cl=rt>100?'#F44336':rt>=80?'#FF9800':'#4CAF50';
    h+='<div style="margin:8px 0;padding:8px;background:#f5f5f5;border-radius:8px"><strong>'+fc+'</strong>: <span style="color:'+cl+'">'+q.toLocaleString()+'/'+cp.toLocaleString()+' ('+rt+'%)</span>';
    h+='<div class="capa-b"><div class="fill" style="width:'+Math.min(rt,100)+'%;background:'+cl+'"></div></div></div>';});
  h+='<div style="margin-top:10px">';
  items.forEach(it=>{const cl=it.fc==='1кіөмһҘ'?'#1565C0':'#2E7D32';
    h+='<div style="padding:8px;margin:4px 0;border-left:3px solid '+cl+';background:#fafafa;border-radius:6px;font-size:13px">';
    h+=(it.u?'рҹҡЁ ':'')+(it.d?'вң… ':'')+'<strong>'+it.p+'</strong> ('+it.b+') <span style="color:'+cl+'">'+it.q.toLocaleString()+'к°ң</span>';
    if(it.e)h+=' рҹ“Ұ'+it.e;
    h+='</div>';});
  h+='</div><div class="brow"><button class="btn bc" onclick="clM()">лӢ«кё°</button></div>';
  shM(h);
}
function rSort(){
  const fp=document.getElementById('fProd').value.toUpperCase();
  const fl=document.getElementById('fLot').value.toUpperCase();
  const ff=document.getElementById('fFac').value;
  const fd=document.getElementById('fDone').checked;
  let shown=0,total=sorted.length,comp=0,urg=0;
  let h='';
  sorted.forEach(item=>{
    const p=item['м ңн’ҲлӘ…'],b=item['кё°мҙҲлЎңнҠё'];
    const st=gSt(p,b),isDone=st['мғқмӮ°мҷ„лЈҢ'],isUrg=st['кёҙкёү'],cur=st['нҳ„нҷ©'];
    if(isDone)comp++;if(isUrg&&!isDone)urg++;
    if(fp&&!p.toUpperCase().includes(fp))return;
    if(fl&&!b.toUpperCase().includes(fl))return;
    if(ff==='none'&&['1кіөмһҘ','2кіөмһҘ'].includes(cur))return;
    if(ff&&ff!=='none'&&cur!==ff)return;
    if(isDone&&!fd)return;
    shown++;
    const isFac=['1кіөмһҘ','2кіөмһҘ'].includes(cur);
    h+='<div class="si-card'+(isUrg&&!isDone?' urg':'')+(isDone?' comp':'')+'">';
    h+='<div class="top"><div><span class="pn">'+p+'</span><span class="li">'+b+'</span></div>';
    h+='<div><span class="qt">'+item['мҳӨлҚ”мҲҳлҹү'].toLocaleString()+'</span>';
    h+=' <span onclick="sSt(\''+p+'\',\''+b+'\',\'кёҙкёү\','+(isUrg?'false':'true')+')" style="cursor:pointer;font-size:18px">'+(isUrg?'рҹҡЁ':'в¬ң')+'</span></div></div>';
    h+='<div class="sr">';
    h+='<span class="sc'+(isFac?' on':'')+'" onclick="cyFac(\''+p+'\',\''+b+'\')">рҹҸӯ '+(isFac?cur:'мғқмӮ°мӨ‘')+'</span>';
    ['SPC NG','OQC NG','кё°нғҖ'].forEach(s=>{const cn=cur===s?'on '+(s==='SPC NG'?'spc':s==='OQC NG'?'oqc':'etc'):'';
      h+='<span class="sc '+cn+'" onclick="tgSt(\''+p+'\',\''+b+'\',\''+s+'\')">' +s+'</span>';});
    h+='<span class="sc'+(isDone?' on dn':'')+'" onclick="sSt(\''+p+'\',\''+b+'\',\'мғқмӮ°мҷ„лЈҢ\','+(isDone?'false':'true')+')">' +'вң…</span></div>';
    h+='<div class="dr">';
    h+='<span class="df'+(st['мғқмӮ°мқјмһҗ']?'':' empty')+'" onclick="eDate(\''+p+'\',\''+b+'\',\'мғқмӮ°мқјмһҗ\')">рҹ“… '+(st['мғқмӮ°мқјмһҗ']||'мғқмӮ°мқјмһҗ')+'</span>';
    h+='<span class="df'+(st['лӮ©н’Ҳмҡ”мІӯмқјмһҗ']?'':' empty')+'" onclick="eDate(\''+p+'\',\''+b+'\',\'лӮ©н’Ҳмҡ”мІӯмқјмһҗ\')">рҹ“Ұ '+(st['лӮ©н’Ҳмҡ”мІӯмқјмһҗ']||'лӮ©н’Ҳмҡ”мІӯ')+'</span>';
    h+='<span class="df'+(st['мһ…кі мҳҲм •мқј']?'':' empty')+'" onclick="eDate(\''+p+'\',\''+b+'\',\'мһ…кі мҳҲм •мқј\')">рҹҡҡ '+(st['мһ…кі мҳҲм •мқј']||'мһ…кі мҳҲм •')+'</span>';
    h+='</div>';
    const memo=st['л©”лӘЁ'];
    if(memo){const md=memo.replace(/\n/g,' ').slice(0,30);h+='<div class="mp" onclick="eMemo(\''+p+'\',\''+b+'\')">' +'рҹ“қ '+md+(memo.length>30?'вҖҰ':'')+'</div>';}
    else h+='<div class="mp" onclick="eMemo(\''+p+'\',\''+b+'\')" style="color:#ccc">рҹ“қ л©”лӘЁ м¶”к°Җ</div>';
    h+='</div>';
  });
  document.getElementById('sList').innerHTML=h||'<div class="loading">н‘ңмӢңн•  н•ӯлӘ© м—ҶмқҢ</div>';
  let info='м „мІҙ '+total+' | м§„н–ү '+(total-comp)+' | мҷ„лЈҢ '+comp;
  if(urg)info+=' | рҹҡЁ'+urg;
  if(shown<total-comp||fd)info='рҹ”Қ '+shown+'кұҙ / '+info;
  document.getElementById('sInfo').textContent=info;
}
function cyFac(p,b){const st=gSt(p,b),c=st['нҳ„нҷ©'];let n;if(c==='1кіөмһҘ')n='2кіөмһҘ';else if(c==='2кіөмһҘ')n='';else n='1кіөмһҘ';sSt(p,b,'нҳ„нҷ©',n);}
function tgSt(p,b,s){const st=gSt(p,b);sSt(p,b,'нҳ„нҷ©',st['нҳ„нҷ©']===s?'':s);}
function eDate(p,b,f){
  const st=gSt(p,b),cur=st[f]||'';
  const labels={'мғқмӮ°мқјмһҗ':'рҹ“… мғқмӮ°мқјмһҗ','лӮ©н’Ҳмҡ”мІӯмқјмһҗ':'рҹ“Ұ лӮ©н’Ҳмҡ”мІӯмқјмһҗ','мһ…кі мҳҲм •мқј':'рҹҡҡ мһ…кі мҳҲм •мқј'};
  let sv=cur;if(cur.includes('~'))sv=cur.split('~')[0];
  let h='<h3>'+labels[f]+'</h3><div class="sub">'+p+' / '+b+'</div>';
  h+='<input type="date" id="mDI" value="'+sv+'">';
  if(f==='мғқмӮ°мқјмһҗ'&&['1кіөмһҘ','2кіөмһҘ'].includes(st['нҳ„нҷ©'])){
    const cap=CAPA[st['нҳ„нҷ©']],qty=sorted.find(i=>i['м ңн’ҲлӘ…']===p&&i['кё°мҙҲлЎңнҠё']===b)?.['мҳӨлҚ”мҲҳлҹү']||0;
    const days=Math.ceil(qty/cap);
    if(days>1){h+='<div style="margin-top:8px;font-size:12px;color:#1565C0">рҹ“Ң '+st['нҳ„нҷ©']+': '+qty.toLocaleString()+' / CAPA '+cap.toLocaleString()+' = '+days+'мқј';
      h+='<div style="margin-top:4px">мғқмӮ°мқјмҲҳ: <input type="number" id="mDN" value="'+days+'" min="1" max="99" style="width:70px;padding:6px;border:1px solid #ddd;border-radius:8px"></div></div>';}
  }
  h+='<div class="brow"><button class="btn bp" onclick="svDate(\''+p+'\',\''+b+'\',\''+f+'\')">' +'вң… м ҖмһҘ</button>';
  h+='<button class="btn bd" onclick="sSt(\''+p+'\',\''+b+'\',\''+f+'\',\'\');clM()">рҹ—‘ н•ҙм ң</button>';
  h+='<button class="btn bc" onclick="clM()">м·ЁмҶҢ</button></div>';
  shM(h);
}
function svDate(p,b,f){
  const v=document.getElementById('mDI').value;if(!v){clM();return;}
  const dn=document.getElementById('mDN');let res=v;
  if(dn){const d=parseInt(dn.value)||1;if(d>1){const s=new Date(v),e=new Date(s);e.setDate(e.getDate()+d-1);res=v+'~'+e.toISOString().split('T')[0];}}
  sSt(p,b,f,res);clM();
}
function eMemo(p,b){
  const st=gSt(p,b);
  let h='<h3>рҹ“қ л©”лӘЁ</h3><div class="sub">'+p+' / '+b+'</div>';
  h+='<textarea id="mMI">'+(st['л©”лӘЁ']||'')+'</textarea>';
  h+='<div class="brow"><button class="btn bp" onclick="sSt(\''+p+'\',\''+b+'\',\'л©”лӘЁ\',document.getElementById(\'mMI\').value);clM()">' +'рҹ’ҫ м ҖмһҘ</button>';
  h+='<button class="btn bd" onclick="sSt(\''+p+'\',\''+b+'\',\'л©”лӘЁ\',\'\');clM()">рҹ—‘ мӮӯм ң</button>';
  h+='<button class="btn bc" onclick="clM()">м·ЁмҶҢ</button></div>';
  shM(h);
}
function shM(h){document.getElementById('mContent').innerHTML=h;document.getElementById('mOverlay').classList.add('on');}
function clM(e){if(e&&e.target&&e.target.id!=='mOverlay')return;document.getElementById('mOverlay').classList.remove('on');}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
loadAll();
</script>
